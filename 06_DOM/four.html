<script>
    function addname(name){
        const li = document.createElement('li')
        li.innerHTML = name
        document.querySelector('ul').appendChild(li)
    }

    // addname("<h1> hii </h1>")
    addname("shambhu")

    function optaddname(name){
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(name))
        document.querySelector("ul").appendChild(li)
    }
    
    optaddname("<h1> hii </h1>")
