

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI CALCULATOR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>BMI CALCULATOR</h1>

    <form>
    
    <div class="input_box">
        <label for="height">Height (cm)</label>
      <input type="number" placeholder=" Enter height" id="height">
    </div>

    <div class="input_box">
        <label for="weight" >Weight (kg)</label>
      <input type="number"  placeholder="Enter weight" id="weight">
    </div>

    <button type="submit"> calculate</button>

    </form>

    <div id="result">


    </div>

    <script>
        const form = document.querySelector("form")
        const result= document.getElementById("result")
        
        form.addEventListener("submit",function(event){
            event.preventDefault()

            const height = Number(document.getElementById("height").value)
            const weight = Number(document.getElementById("weight").value)

            if(height==='' || height<0 || isNaN(height)){
                // console.log("please enter valid height")
                result.innerHTML=" please enter valid height"
                
            } else if(weight==='' || weight<0 || isNaN(weight)){
                // console.log("please enter valis age")
                result.innerHTML= " please enter valid weight"

            } else{

                const BMI = weight/((height/100)*(height/100))
               result.innerText = "Your BMI is : " + BMI.toFixed(2)
            }
         
            
        })

    </script>
</body>
</html>
