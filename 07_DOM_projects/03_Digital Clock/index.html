<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        body{
            background-color: black;
        }
        h1{
            color: white;
            text-align: center;
            margin-bottom: 40px;
        }
        #clock{
            display: flex;
            justify-content: center;
            align-items: center;
        
            width: 200px;
            height: 50px;
            background-color: green;
            margin: auto;
        
            border-radius: 20px;
            color: white;
        }
    </style>
</head>

<body>

    <h1>Live clock</h1>

    <div id="clock">

        
    </div>
    <script>
        const clock = document.getElementById("clock")

        
        setInterval(function(){
            const time = new Date()
            // console.log(time)
            clock.innerHTML = time.toLocaleTimeString();

        },1000)
    </script>
    
</body>
</html>
